persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
password_file /mosquitto/config/auth/passwd
acl_file /mosquitto/config/auth/acl

# Legacy plaintext listener. Keep only for migration/testing.
listener 1883
protocol mqtt
allow_anonymous false

# Legacy plaintext WebSocket listener.
listener 9001
protocol websockets
allow_anonymous false

# TLS MQTT listener for production clients.
listener 8883
protocol mqtt
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
tls_version tlsv1.2
require_certificate false
allow_anonymous false

# Secure WebSocket listener (WSS).
listener 9443
protocol websockets
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
tls_version tlsv1.2
require_certificate false
allow_anonymous false
